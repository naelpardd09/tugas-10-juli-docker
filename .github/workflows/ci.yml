name: CI/CD Docker Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-push-pull:
    name: Build, Push & Pull Docker Images
    runs-on:
      - self-hosted
      - docker-local
    environment: dev
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: naelpardd09
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -t naelpardd09/backend-loan-service:latest \
            ./aegira-loan-service

      - name: Build Frontend Image
        run: |
          docker build \
            -t naelpardd09/frontend-loan-service:latest \
            ./creditappdemo

      - name: Push Backend Image
        run: |
          docker push naelpardd09/backend-loan-service:latest

      - name: Push Frontend Image
        run: |
          docker push naelpardd09/frontend-loan-service:latest

      - name: Pull Backend Image
        run: |
          docker pull naelpardd09/backend-loan-service:latest

      - name: Pull Frontend Image
        run: |
          docker pull naelpardd09/frontend-loan-service:latest

      - name: Start Application
        run: |
          docker compose up -d

      - name: Check Containers
        run: docker ps
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: [self-hosted, docker-local]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build backend (Maven)
        working-directory: ./aegira-loan-service
        run: mvn -B clean package -DskipTests

      - name: Run backend tests
        working-directory: ./aegira-loan-service
        run: mvn -B test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./creditappdemo
        run: npm install

      - name: Build frontend
        working-directory: ./creditappdemo
        run: npm run build

  docker-build-and-run:
    needs: build-and-test
    runs-on: [self-hosted, docker-local]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend to be up
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8080/ -o /dev/null; then
              echo "Backend is responding"
              break
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 5
          done

      - name: Tear down services
        if: always()
        run: docker compose down
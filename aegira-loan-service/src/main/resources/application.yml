spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aegira_loan}
    username: ${SPRING_DATASOURCE_USERNAME:aegira}
    password: ${SPRING_DATASOURCE_PASSWORD:aegira_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AegiraLoanHikariPool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      idle-timeout: ${DB_IDLE_TIMEOUT:30000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: ${REDIS_TIMEOUT:2000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-this-secret}
  expiration: ${JWT_EXPIRATION:3600000}

loan:
  data-source:
    mode: ${LOAN_DATA_SOURCE_MODE:DATABASE}
  idempotency:
    enabled: ${IDEMPOTENCY_ENABLED:true}
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} request_id=%X{requestId} correlation_id=%X{correlation_id} business_correlation_id=%X{business_correlation_id} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
